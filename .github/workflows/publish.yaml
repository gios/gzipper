name: Publish Package

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - run: |
          TAG="${{ github.event.inputs.tag }}"

          if [ -z "$TAG" ]; then
            echo "No tag found, exiting"
            exit 1
          fi

          echo "Publishing tag: $TAG"

  test:
    needs: info
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24, 26]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install pnpm dependencies
        uses: ./.github/actions/install-pnpm-dependencies

      - name: Validate
        run: |
          pnpm run eslint
          pnpm run tsc
          pnpm run test

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Validate tag matches commit
        run: |
          TAG="${{ github.event.inputs.tag }}"

          echo "Tag: $TAG"

          TAG_SHA=$(git rev-list -n 1 "$TAG")
          HEAD_SHA=$(git rev-parse HEAD)

          echo "Tag SHA:  $TAG_SHA"
          echo "Head SHA: $HEAD_SHA"

          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "Tag does not match commit. Exiting."
            exit 1
          fi

          echo "Tag matches commit. Proceeding..."

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'
          registry-url: https://registry.npmjs.org/

      - name: Install pnpm dependencies
        uses: ./.github/actions/install-pnpm-dependencies

      - name: Build
        run: pnpm run build

      - name: Publish
        run: cd dist && pnpm publish --provenance --no-git-checks

      - name: Cleanup on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag }}"

          gh release delete "$TAG" --yes

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git push --delete origin "$TAG"

          git tag -d "$TAG"

          COMMIT_SHA=$(git log --grep="^chore: release ${{ github.event.inputs.tag }}$" --format="%H" -n 1)

          if [ -n "$COMMIT_SHA" ]; then
            git revert --no-edit "$COMMIT_SHA"
            git push origin HEAD
          fi

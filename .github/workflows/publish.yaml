name: Publish Package

on:
  workflow_run:
    workflows: ['Release']
    types:
      - completed

jobs:
  test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24, 26]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install pnpm dependencies
        uses: ./.github/actions/install-pnpm-dependencies

      - name: Validate
        run: |
          pnpm run eslint
          pnpm run tsc
          pnpm run test

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Debug tag resolution
        run: |
          echo "=== GIT CONTEXT ==="
          echo "HEAD commit:"
          git rev-parse HEAD

          echo ""
          echo "=== LAST COMMIT INFO ==="
          git log -1 --oneline

          echo ""
          echo "=== ALL TAGS (LOCAL) ==="
          git tag -l

          echo ""
          echo "=== TAGS POINTING TO HEAD ==="
          git tag --points-at HEAD

          echo ""
          echo "=== DESCRIBE (best guess tag) ==="
          git describe --tags --always || true

          echo ""
          echo "=== REFS ==="
          git show-ref --tags || true

      - name: Get tag
        run: |
          TAG=$(git tag --points-at HEAD)

          if [ -z "$TAG" ]; then
            echo "No tag found on current commit (HEAD)"
            exit 1
          fi

          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Detected tag: $TAG"

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'
          registry-url: https://registry.npmjs.org/

      - name: Install pnpm dependencies
        uses: ./.github/actions/install-pnpm-dependencies

      - name: Build
        run: pnpm run build

      - name: Publish
        run: cd dist && pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

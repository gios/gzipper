name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version in format v1.2.3'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate version
        run: |
          VERSION="${{ github.event.inputs.version }}"

          if ! echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must be in format v1.2.3"
            exit 1
          fi

      - name: Update package.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PACKAGE_VERSION="${VERSION#v}"

          pnpm version "$PACKAGE_VERSION" --no-git-tag-version

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json pnpm-lock.json
          git commit -m "chore: release ${{ github.event.inputs.version }}"

      - name: Create tag
        run: |
          git tag "${{ github.event.inputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "refs/tags/${{ github.event.inputs.version }}"
